<div class="home-page">
  <header class="menu-header">
    <div class="header-row">
      <h1>Productos</h1>
      <button class="btn-volver" (click)="volverCategorias()">Volver</button>
    </div>
    <p class="sub" *ngIf="categoriaId !== null">Categoría #{{ categoriaId }}</p>
  </header>

  <div class="menu-container">
    <div class="card" *ngFor="let producto of productosFiltrados">
      <div class="card-overlay">
        <h2>{{ producto.nombre }}</h2>
        <img
          [src]="producto.imagenSrc || '/assets/logo.png'"
          alt="{{ producto.nombre }}"
          class="producto-img">

        <p class="desc" *ngIf="producto.descripcion">{{ producto.descripcion }}</p>
        <p class="precio">{{ producto.precio | currency:'COP':'symbol-narrow':'1.0-0' }}</p>

        <button class="btn-ver">Ver más</button>
      </div>
    </div>
  </div>
</div>
