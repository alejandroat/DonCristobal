<div class="home-page">
  <header class="menu-header">
    <div class="header-row">
      <button class="logo-btn" type="button" (click)="volverInicio()" aria-label="Volver a inicio">
        <img class="logo-img" src="/assets/logo-blanco.png" alt="Inicio">
      </button>
      <h1 *ngIf="categoriaNombre">{{ categoriaNombre }}</h1>
      <button class="btn-volver" (click)="volverCategorias()">Volver</button>
    </div>
  </header>

  <div class="menu-container">
    <div class="card" *ngFor="let producto of productosFiltrados">
      <div class="card-overlay">
        <h2>{{ producto.nombre }}</h2>

        <div class="img-slot">
          <img
            *ngIf="producto.imagenSrc"
            [src]="producto.imagenSrc"
            alt="{{ producto.nombre }}"
            class="producto-img">
        </div>

        <p class="desc" *ngIf="producto.descripcion">{{ producto.descripcion }}</p>
        <p class="precio">{{ producto.precio | currency:'COP':'symbol-narrow':'1.0-0' }}</p>

      </div>
    </div>
  </div>
</div>
