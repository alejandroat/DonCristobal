<div class="home-page">
    <header class="menu-header">
        <div class="header-row">
            <button class="logo-btn" type="button" (click)="volverInicio()" aria-label="Volver a inicio">
                <img class="logo-img" src="/assets/logo-blanco.png" alt="Inicio">
            </button>
            <h1>Nuestro Menú</h1>
            <div class="header-spacer"></div>
        </div>
    </header>
    <div class="menu-container">
        <div class="card" *ngFor="let categoria of categoriasfiltradas">
            <div class="card-overlay">
                <h2>{{ categoria.nombre }}</h2>

                <div class="img-slot">
                  <img
                    *ngIf="categoria.imagenSrc"
                    [src]="categoria.imagenSrc"
                    alt="{{ categoria.nombre }}"
                    class="categoria-img">
                </div>

                <button class="btn-ver" (click)="verProductos(categoria.id)">Ver más</button>
            </div>
        </div>
    </div>
</div>
